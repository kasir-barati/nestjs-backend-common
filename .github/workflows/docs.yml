name: Generate Documentation

on:
  workflow_run:
    workflows: ["Publish The Library"]
    types:
      - completed
    branches:
      - main

permissions:
  contents: write

jobs:
  docs:
    runs-on: ubuntu-24.04
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        name: Install pnpm
        with:
          version: 10
          run_install: false

      - name: Install NodeJS
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "pnpm"

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Documentation
        run: pnpm exec typedoc src/index.ts

      - name: Commit Documentation
        id: commit_docs
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add docs/

          if [[ -n $(git status --porcelain docs/) ]]; then
            echo "Documentation changes detected, committing..."
            git commit -m "chore: update documentation"
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "No documentation changes detected, skipping commit"
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Push Changes
        if: steps.commit_docs.outputs.has_changes == 'true'
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ github.ref }}
