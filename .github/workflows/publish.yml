name: Publish The Library

on:
  push:
    branches:
      - main

permissions:
  # https://stackoverflow.com/a/72183279/8784518
  id-token: write
  contents: write

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate no manual version bumps
        run: |
          # Get current package.json version
          CURRENT_VERSION=$(node -p "require('./package.json').version")

          # Get last tag, handle case when no tags exist
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")

          if [[ -z "$LAST_TAG" ]]; then
            echo "ℹ️  No tags found - assuming first run, skipping validation"
            exit 0
          fi

          LAST_VERSION=${LAST_TAG#v}

          # Get last commit message
          LAST_COMMIT_MSG=$(git log -1 --pretty=%B)

          # Check if version changed manually (not by bot)
          if [[ "$CURRENT_VERSION" != "$LAST_VERSION" ]] && [[ ! "$LAST_COMMIT_MSG" =~ ^chore\(release\): ]]; then
            echo "❌ ERROR: package.json version was manually changed!"
            echo "Current version: $CURRENT_VERSION"
            echo "Last tagged version: $LAST_VERSION"
            echo ""
            echo "Manual version bumps are not allowed. Please use conventional commits:"
            echo "  - fix: for bug fixes (patch bump)"
            echo "  - feat: for new features (minor bump)"
            echo "  - BREAKING CHANGE: for breaking changes (major bump)"
            echo ""
            echo "Revert the version change and use proper commit messages."
            exit 1
          fi

          echo "✅ Version validation passed"

      - name: Bump version and push tag
        id: version_bump
        uses: phips28/gh-action-bump-version@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag-prefix: "v"
          default: "false"
          major-wording: "BREAKING CHANGE,major"
          minor-wording: "feat,feature"
          patch-wording: "fix,patch,bugfix"
          rc-wording: ""
          skip-tag: "false"
          skip-commit: "false"
          skip-push: "false"
          commit-message: "chore(release): bump version to {{version}} [skip ci]"

      - name: Check the current published version
        id: version_check
        run: |
          LAST_PUBLISHED_VERSION=$(npm view nestjs-backend-common version 2> /dev/null || echo "")
          PACKAGE_VERSION=$(cat package.json | grep version | head -1 | awk -F: '{ print $2 }' | sed 's/[",]//g' | tr -d ' ')

          echo "last_published=$LAST_PUBLISHED_VERSION" >> $GITHUB_OUTPUT
          echo "package_version=$PACKAGE_VERSION" >> $GITHUB_OUTPUT

          if [[ "$LAST_PUBLISHED_VERSION" == "$PACKAGE_VERSION" ]]; then
            echo "should_publish=false" >> $GITHUB_OUTPUT
            echo "::warning::Skipping publish - version $PACKAGE_VERSION is already published on npm"
          else
            echo "should_publish=true" >> $GITHUB_OUTPUT
            echo "Will publish new version: $PACKAGE_VERSION (current: $LAST_PUBLISHED_VERSION)"
          fi

      - uses: pnpm/action-setup@v4
        if: steps.version_check.outputs.should_publish == 'true'
        name: Install pnpm
        with:
          version: 10
          run_install: false

      - name: Install NodeJS
        if: steps.version_check.outputs.should_publish == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "pnpm"
          registry-url: "https://registry.npmjs.org/"

      - name: Install Dependencies
        if: steps.version_check.outputs.should_publish == 'true'
        run: pnpm install --frozen-lockfile

      - name: Apply Eslint
        if: steps.version_check.outputs.should_publish == 'true'
        run: pnpm lint

      - name: Run Unit Tests
        if: steps.version_check.outputs.should_publish == 'true'
        run: pnpm test:unit

      - name: Publish Package on npm 📦
        if: steps.version_check.outputs.should_publish == 'true'
        run: pnpm publish --provenance --access public --no-git-checks
        env:
          NPM_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
